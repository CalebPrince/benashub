{% extends "base.html" %}
{% block title %}Create Account &mdash; Benas Hub{% endblock %}
{% block content %}

<section class="bh-page-header">
  <div class="container py-4">
    <h1 class="bh-page-title">Create Account</h1>
  </div>
</section>

<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="bh-filter-card">
        <div id="registerError" class="alert alert-danger d-none"></div>
        <form id="accountRegisterForm">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Phone (optional)</label>
            <input type="tel" class="form-control" name="phone">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required minlength="8">
            <div class="form-text">At least 8 characters.</div>
          </div>
          <button type="submit" class="btn bh-btn-red w-100">Create Account</button>
        </form>
        <p class="small text-secondary text-center mt-3 mb-0">
          Already have an account? <a href="{{ url_for('pages.account_login') }}">Log in</a>
        </p>
      </div>
    </div>
  </div>
</section>

{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/account.js') }}"></script>
<script>document.addEventListener('DOMContentLoaded', () => BH.account.initRegister());</script>
{% endblock %}
