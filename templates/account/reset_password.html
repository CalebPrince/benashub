{% extends "base.html" %}
{% block title %}Reset Password &mdash; Benas Hub{% endblock %}
{% block content %}

<section class="bh-page-header">
  <div class="container py-4">
    <h1 class="bh-page-title">Reset Password</h1>
  </div>
</section>

<section class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      <div class="bh-filter-card">
        <div id="resetDone" class="alert alert-success d-none">
          Your password has been reset. <a href="{{ url_for('pages.account_login') }}">Log in</a> with your new password.
        </div>
        <div id="resetError" class="alert alert-danger d-none"></div>
        <form id="resetPasswordForm">
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" name="password" minlength="8" required autofocus autocomplete="new-password">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-control" name="confirm_password" minlength="8" required autocomplete="new-password">
          </div>
          <button type="submit" class="btn bh-btn-red w-100">Reset Password</button>
        </form>
      </div>
    </div>
  </div>
</section>

{% endblock %}
{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/account.js') }}"></script>
<script>document.addEventListener('DOMContentLoaded', () => BH.account.initResetPassword());</script>
{% endblock %}
