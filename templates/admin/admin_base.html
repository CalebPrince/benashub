<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Admin &mdash; Benas Hub{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bh-admin-body">
  <nav class="navbar navbar-dark bh-navbar">
    <div class="container-fluid px-4">
      <span class="navbar-brand d-flex align-items-center gap-2 mb-0">
        <span class="bh-logo-badge">bh</span>
        <span class="bh-brand-title">BENAS HUB ADMIN</span>
      </span>
      <div class="d-flex align-items-center gap-3">
        <span id="adminUsername" class="text-white-50 small"></span>
        <button id="logoutBtn" class="btn btn-outline-light btn-sm">Log Out</button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">
    {% block admin_content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
