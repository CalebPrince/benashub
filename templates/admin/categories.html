{% extends "admin/admin_base.html" %}
{% block title %}Categories &mdash; Benas Hub Admin{% endblock %}
{% block admin_content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Categories</h3>
  <button class="btn bh-btn-red" id="addCategoryBtn">+ Add Category</button>
</div>

<div class="table-responsive">
  <table class="table align-middle bh-table">
    <thead>
      <tr><th>Name</th><th>Slug</th><th>Sort Order</th><th>Products</th><th></th></tr>
    </thead>
    <tbody id="categoriesTableBody"></tbody>
  </table>
</div>

<!-- Category Modal -->
<div class="modal fade" id="categoryModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="categoryForm">
        <div class="modal-header">
          <h5 class="modal-title" id="categoryModalTitle">Add Category</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" name="id">
          <div id="categoryFormError" class="alert alert-danger d-none"></div>
          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" name="name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Slug</label>
            <input type="text" class="form-control" name="slug" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea class="form-control" name="description" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">Sort Order</label>
            <input type="number" class="form-control" name="sort_order" value="0">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn bh-btn-red">Save Category</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>document.addEventListener('DOMContentLoaded', () => BH.admin.initCategories());</script>
{% endblock %}
