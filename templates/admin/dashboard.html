{% extends "admin/admin_base.html" %}
{% block title %}Dashboard &mdash; Benas Hub Admin{% endblock %}
{% block admin_content %}

<h3 class="mb-4">Dashboard</h3>

<div class="row g-3 mb-4" id="statCards"></div>

<div class="row g-4">
  <div class="col-lg-7">
    <div class="bh-filter-card">
      <h5 class="mb-3">Recent Orders</h5>
      <div id="recentOrdersEmpty" class="text-secondary small d-none">No orders yet.</div>
      <div class="table-responsive">
        <table class="table align-middle bh-table">
          <thead>
            <tr><th>Order Ref</th><th>Customer</th><th>Status</th><th>Total</th></tr>
          </thead>
          <tbody id="recentOrdersBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="bh-filter-card">
      <h5 class="mb-3">Low Stock</h5>
      <div id="lowStockEmpty" class="text-secondary small d-none">Nothing is running low.</div>
      <ul class="list-group list-group-flush" id="lowStockList"></ul>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>document.addEventListener('DOMContentLoaded', () => BH.admin.initOverview());</script>
{% endblock %}
