<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login &mdash; Benas Hub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
</head>
<body class="bh-admin-login-body d-flex align-items-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
          <span class="bh-logo-badge bh-logo-badge-invert bh-logo-badge-lg">bh</span>
          <h4 class="mt-3 text-white">Benas Hub Admin</h4>
        </div>
        <div class="bh-login-card">
          <div id="loginError" class="alert alert-danger d-none"></div>
          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" name="username" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" name="password" required>
            </div>
            <button type="submit" class="btn bh-btn-red w-100">Log In</button>
          </form>
        </div>
      </div>
    </div>
  </div>
  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
  <script>document.addEventListener('DOMContentLoaded', () => BH.admin.initLogin());</script>
</body>
</html>
