{% extends "admin/admin_base.html" %}
{% block title %}Orders &mdash; Benas Hub Admin{% endblock %}
{% block admin_content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Orders</h3>
  <select class="form-select w-auto" id="orderStatusFilter">
    <option value="">All statuses</option>
    <option value="pending_payment">Pending Payment</option>
    <option value="paid">Paid</option>
    <option value="processing">Processing</option>
    <option value="shipped">Shipped</option>
    <option value="completed">Completed</option>
    <option value="payment_failed">Payment Failed</option>
    <option value="cancelled">Cancelled</option>
  </select>
</div>

<div class="table-responsive">
  <table class="table align-middle bh-table">
    <thead>
      <tr><th>Order Ref</th><th>Customer</th><th>Country</th><th>Total</th><th>Status</th><th>Date</th><th></th></tr>
    </thead>
    <tbody id="ordersTableBody"></tbody>
  </table>
</div>

<!-- Order Detail Modal -->
<div class="modal fade" id="orderModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Order Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="orderModalBody"></div>
      <div class="modal-footer">
        <select class="form-select w-auto" id="orderStatusSelect">
          <option value="pending_payment">Pending Payment</option>
          <option value="paid">Paid</option>
          <option value="processing">Processing</option>
          <option value="shipped">Shipped</option>
          <option value="completed">Completed</option>
          <option value="payment_failed">Payment Failed</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <button type="button" class="btn bh-btn-red" id="saveOrderStatusBtn">Update Status</button>
      </div>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>document.addEventListener('DOMContentLoaded', () => BH.admin.initOrders());</script>
{% endblock %}
