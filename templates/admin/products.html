{% extends "admin/admin_base.html" %}
{% block title %}Products &mdash; Benas Hub Admin{% endblock %}
{% block admin_content %}

<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-0">Products</h3>
  <div class="d-flex align-items-center gap-3">
    <div class="form-check">
      <input class="form-check-input" type="checkbox" id="showInactiveToggle">
      <label class="form-check-label" for="showInactiveToggle">Show inactive products</label>
    </div>
    <button class="btn bh-btn-red" id="addProductBtn">+ Add Product</button>
  </div>
</div>

<div class="table-responsive">
  <table class="table align-middle bh-table">
    <thead>
      <tr>
        <th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th>
        <th>Ships Intl.</th><th>Status</th><th></th>
      </tr>
    </thead>
    <tbody id="productsTableBody"></tbody>
  </table>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <form id="productForm">
        <div class="modal-header">
          <h5 class="modal-title" id="productModalTitle">Add Product</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" name="id">
          <div id="productFormError" class="alert alert-danger d-none"></div>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" name="name" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Slug</label>
              <input type="text" class="form-control" name="slug" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Category</label>
              <select class="form-select" name="category_id" id="productCategorySelect" required></select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Price (GHS)</label>
              <input type="number" step="0.01" min="0" class="form-control" name="price_ghs" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Stock Quantity</label>
              <input type="number" min="0" class="form-control" name="stock_qty" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Image</label>
              <input type="file" class="form-control" id="productImageInput" accept="image/png,image/jpeg,image/webp,image/gif">
              <input type="hidden" name="image_url">
              <img id="productImagePreview" class="bh-image-preview mt-2 d-none" alt="Preview">
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" name="description" rows="3"></textarea>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="ships_internationally" id="shipsIntlCheck">
                <label class="form-check-label" for="shipsIntlCheck">Ships internationally</label>
              </div>
            </div>
            <div class="col-md-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="is_active" id="isActiveCheck" checked>
                <label class="form-check-label" for="isActiveCheck">Active (visible in shop)</label>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn bh-btn-red">Save Product</button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
{% block extra_scripts %}
<script>document.addEventListener('DOMContentLoaded', () => BH.admin.initProducts());</script>
{% endblock %}
